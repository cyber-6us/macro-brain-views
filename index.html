<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Macro Brain">
  <title>Macro Brain</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px; line-height: 1.6; min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
    .app-title span { color: #58a6ff; }
    .header-meta { font-size: 12px; color: #8b949e; }

    /* ── Tabs ── */
    .tabs {
      display: flex; border-bottom: 1px solid #30363d;
      padding: 0 20px; background: #0d1117; overflow-x: auto;
    }
    .tab {
      padding: 10px 18px; font-size: 13px; font-weight: 500; color: #8b949e;
      cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
      background: none; border-left: none; border-right: none; border-top: none;
      transition: color 0.15s;
    }
    .tab:hover { color: #e6edf3; }
    .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* ── Content ── */
    .content { max-width: 820px; margin: 0 auto; padding: 20px 16px; }

    /* ── Period header ── */
    .period-header {
      display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px;
    }
    .period-title { font-size: 18px; font-weight: 700; }
    .period-meta { font-size: 12px; color: #8b949e; }
    .entry-pill {
      font-size: 11px; background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 3px 10px; color: #8b949e;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .entry-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; }

    /* ── Section labels ── */
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase;
      padding: 6px 10px; border-radius: 5px; margin: 20px 0 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-label.buy   { color: #58a6ff; background: rgba(88,166,255,0.08);  border-left: 3px solid #58a6ff; }
    .sec-label.sell  { color: #e3b341; background: rgba(227,179,65,0.08);  border-left: 3px solid #e3b341; }
    .sec-label.new   { color: #f0883e; background: rgba(240,136,62,0.08);  border-left: 3px solid #f0883e; }
    .sec-label.align { color: #3fb950; background: rgba(63,185,80,0.08);   border-left: 3px solid #3fb950; }
    .sec-label.diff  { color: #f85149; background: rgba(248,81,73,0.08);   border-left: 3px solid #f85149; }
    .sec-label.trade { color: #a5d6ff; background: rgba(165,214,255,0.08); border-left: 3px solid #a5d6ff; }
    .sec-label.mkt   { color: #bc8cff; background: rgba(188,140,255,0.08); border-left: 3px solid #bc8cff; }

    .sentiment-badge {
      font-size: 10px; font-weight: 600; padding: 1px 8px; border-radius: 4px; margin-left: auto;
    }
    .sent-bullish { background: rgba(63,185,80,0.15);   color: #3fb950; }
    .sent-bearish { background: rgba(248,81,73,0.15);   color: #f85149; }
    .sent-neutral { background: rgba(139,148,158,0.15); color: #8b949e; }
    .sent-mixed   { background: rgba(227,179,65,0.15);  color: #e3b341; }

    /* ── Bullet list ── */
    .bullet-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
    .bullet-item {
      background: #161b22; border: 1px solid #30363d; border-radius: 7px;
      padding: 9px 13px 9px 32px; font-size: 14px; color: #c9d1d9;
      line-height: 1.55; position: relative;
    }
    .bullet-item::before {
      content: '▸'; position: absolute; left: 12px; top: 10px;
      font-size: 11px; color: #8b949e;
    }
    .bullet-item.buy-bullet   { border-left: 2px solid rgba(88,166,255,0.4); }
    .bullet-item.buy-bullet::before   { color: #58a6ff; }
    .bullet-item.sell-bullet  { border-left: 2px solid rgba(227,179,65,0.4); }
    .bullet-item.sell-bullet::before  { color: #e3b341; }
    .bullet-item.new-bullet   { border-left: 2px solid rgba(240,136,62,0.5); background: rgba(240,136,62,0.04); }
    .bullet-item.new-bullet::before   { content: '★'; color: #f0883e; }
    .bullet-item.align-bullet { border-left: 2px solid rgba(63,185,80,0.4); }
    .bullet-item.align-bullet::before { content: '✓'; color: #3fb950; }
    .bullet-item.diff-bullet  { border-left: 2px solid rgba(248,81,73,0.4); }
    .bullet-item.diff-bullet::before  { content: '↕'; color: #f85149; }
    .bullet-item.mkt-bullet   { border-left: 2px solid rgba(188,140,255,0.4); }
    .bullet-item.mkt-bullet::before   { content: '◎'; color: #bc8cff; }
    .bullet-item.trade-bullet { border-left: 2px solid rgba(165,214,255,0.4); }
    .bullet-item.trade-bullet::before { content: '→'; color: #a5d6ff; }

    /* ── Two-col layout for buy/sell ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }
    .col-block {}

    /* ── Three-col divergence grid ── */
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 700px) { .three-col { grid-template-columns: 1fr; } }

    /* ── Themes ── */
    .themes { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
    .theme-tag {
      background: #21262d; border: 1px solid #30363d; border-radius: 12px;
      padding: 3px 12px; font-size: 12px; color: #8b949e;
    }

    /* ── Investor entries ── */
    .entries-toggle {
      font-size: 12px; color: #8b949e; cursor: pointer; margin-top: 24px;
      display: flex; align-items: center; gap: 6px; padding: 6px 0;
      border-top: 1px solid #30363d; user-select: none;
    }
    .entries-toggle:hover { color: #e6edf3; }
    .entries-list { margin-top: 8px; }

    .investor-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 7px; overflow: hidden; }
    .investor-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; cursor: pointer; gap: 10px;
    }
    .investor-card-header:hover { background: #1c2128; }
    .investor-info { display: flex; align-items: center; gap: 8px; }
    .investor-name { font-size: 14px; font-weight: 600; }
    .investor-side { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .side-buy  { background: rgba(88,166,255,0.12); color: #58a6ff; }
    .side-sell { background: rgba(227,179,65,0.12);  color: #e3b341; }
    .expand-icon { color: #8b949e; font-size: 12px; transition: transform 0.2s; }
    .investor-card.open .expand-icon { transform: rotate(180deg); }
    .investor-card-body { display: none; padding: 0 14px 14px; border-top: 1px solid #21262d; }
    .investor-card.open .investor-card-body { display: block; }
    .investor-summary { font-size: 14px; color: #c9d1d9; margin: 10px 0 6px; }
    .view-list { list-style: none; margin: 0 0 6px; }
    .view-list li { font-size: 13px; color: #8b949e; padding: 2px 0 2px 14px; position: relative; }
    .view-list li::before { content: '›'; position: absolute; left: 0; color: #58a6ff; }
    .trade-mini { font-size: 12px; color: #3fb950; font-style: italic; margin-top: 4px; }
    .sources-row { margin-top: 6px; }
    .sources-row a { font-size: 11px; color: #58a6ff; text-decoration: none; margin-right: 8px; }
    .sources-row a:hover { text-decoration: underline; }

    /* ── Empty / loading ── */
    .state { text-align: center; padding: 60px 20px; color: #8b949e; }
    .spinner {
      width: 26px; height: 26px; border: 2px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .no-content { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 16px; }

    /* ── Ask tab ── */
    .ask-container { max-width: 720px; }
    .api-key-row {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
    }
    .api-key-label { font-size: 12px; color: #8b949e; white-space: nowrap; }
    .api-key-input {
      flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #e6edf3; font-size: 13px; padding: 6px 10px; font-family: monospace;
    }
    .api-key-input:focus { outline: none; border-color: #58a6ff; }
    .save-btn {
      background: #21262d; border: 1px solid #30363d; color: #e6edf3;
      font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer;
    }
    .save-btn:hover { background: #30363d; }
    .key-ok { font-size: 11px; color: #3fb950; }
    .scope-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .scope-btn {
      font-size: 12px; padding: 4px 12px; border-radius: 12px;
      border: 1px solid #30363d; background: #161b22; color: #8b949e; cursor: pointer;
    }
    .scope-btn.active { border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,0.08); }
    .query-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .query-input {
      flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      color: #e6edf3; font-size: 14px; padding: 10px 14px; resize: none;
      min-height: 52px; font-family: inherit;
    }
    .query-input:focus { outline: none; border-color: #58a6ff; }
    .ask-btn {
      background: #238636; border: none; border-radius: 8px; color: #fff;
      font-size: 14px; font-weight: 600; padding: 10px 20px; cursor: pointer; align-self: flex-end;
    }
    .ask-btn:hover { background: #2ea043; }
    .ask-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    .response-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 10px;
      padding: 16px; min-height: 120px; font-size: 14px; line-height: 1.7;
      color: #c9d1d9; white-space: pre-wrap; display: none;
    }
    .response-box.visible { display: block; }
    .response-meta { font-size: 11px; color: #8b949e; margin-top: 10px; padding-top: 10px; border-top: 1px solid #30363d; }
    .inline-spinner { width: 16px; height: 16px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }

    /* ── Ask response ── */
    .ask-key-point {
      background: #161b22; border: 1px solid #30363d; border-left: 3px solid #58a6ff;
      border-radius: 7px; padding: 12px 14px; margin-bottom: 8px;
    }
    .ask-point-text { font-size: 14px; color: #e6edf3; margin-bottom: 8px; line-height: 1.5; }
    .ask-point-text::before { content: '▸ '; color: #58a6ff; }
    .ask-agree-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .ask-agree-label { font-size: 11px; color: #8b949e; align-self: center; margin-right: 2px; }
    .ask-name-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px; cursor: pointer;
      font-weight: 500; border: 1px solid transparent; transition: opacity 0.15s;
    }
    .ask-name-tag:hover { opacity: 0.75; }
    .ask-name-tag.buy  { background: rgba(88,166,255,0.12); color: #58a6ff; border-color: rgba(88,166,255,0.25); }
    .ask-name-tag.sell { background: rgba(227,179,65,0.12);  color: #e3b341; border-color: rgba(227,179,65,0.25); }
    .ask-name-tag.dis  { background: rgba(248,81,73,0.10);   color: #f85149; border-color: rgba(248,81,73,0.2); text-decoration: line-through; }

    .ask-individuals { margin-top: 16px; }
    .ask-ind-toggle {
      font-size: 12px; color: #8b949e; cursor: pointer; padding: 6px 0;
      border-top: 1px solid #30363d; display: flex; align-items: center; gap: 6px;
      user-select: none;
    }
    .ask-ind-toggle:hover { color: #e6edf3; }
    .ask-ind-list { margin-top: 8px; display: none; }
    .ask-ind-list.open { display: block; }
    .ask-ind-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 7px;
      margin-bottom: 6px; overflow: hidden;
    }
    .ask-ind-header {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px;
      cursor: pointer; font-size: 13px;
    }
    .ask-ind-header:hover { background: #1c2128; }
    .ask-ind-name { font-weight: 600; color: #e6edf3; }
    .ask-ind-body { display: none; padding: 0 12px 12px; font-size: 13px; color: #c9d1d9; line-height: 1.6; border-top: 1px solid #21262d; }
    .ask-ind-body.open { display: block; }
    .ask-src { margin-top: 6px; }
    .ask-src a { font-size: 11px; color: #58a6ff; text-decoration: none; margin-right: 8px; }
    .ask-src a:hover { text-decoration: underline; }

    /* ── Evolution tab ── */
    .evo-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; min-height: 400px; }
    @media (max-width: 640px) { .evo-layout { grid-template-columns: 1fr; } }

    .evo-sidebar { border-right: 1px solid #30363d; padding-right: 16px; }
    .evo-group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
      color: #8b949e; margin: 14px 0 6px; padding: 0 4px;
    }
    .evo-investor-btn {
      display: block; width: 100%; text-align: left; background: none;
      border: 1px solid transparent; border-radius: 6px; color: #8b949e;
      font-size: 13px; padding: 6px 10px; cursor: pointer; margin-bottom: 2px;
      transition: all 0.15s;
    }
    .evo-investor-btn:hover { background: #161b22; color: #e6edf3; }
    .evo-investor-btn.active { background: #161b22; border-color: #30363d; color: #e6edf3; }
    .evo-investor-btn.active.buy-active  { border-color: rgba(88,166,255,0.4); color: #58a6ff; }
    .evo-investor-btn.active.sell-active { border-color: rgba(227,179,65,0.4);  color: #e3b341; }

    .evo-main {}
    .evo-header { margin-bottom: 16px; }
    .evo-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .evo-meta { font-size: 12px; color: #8b949e; margin-bottom: 12px; }

    /* Sentiment trend strip */
    .trend-strip { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 20px; }
    .trend-dot {
      width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center;
      justify-content: center; font-size: 9px; font-weight: 700; cursor: default;
      position: relative;
    }
    .trend-dot:hover .trend-tooltip {
      display: block;
    }
    .trend-tooltip {
      display: none; position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
      background: #21262d; border: 1px solid #30363d; border-radius: 5px;
      padding: 4px 8px; font-size: 11px; color: #e6edf3; white-space: nowrap; z-index: 10;
    }
    .trend-dot.t-bullish { background: rgba(63,185,80,0.2);   color: #3fb950; }
    .trend-dot.t-bearish { background: rgba(248,81,73,0.2);   color: #f85149; }
    .trend-dot.t-mixed   { background: rgba(227,179,65,0.2);  color: #e3b341; }
    .trend-dot.t-neutral { background: rgba(139,148,158,0.2); color: #8b949e; }

    /* Timeline entries */
    .evo-timeline { display: flex; flex-direction: column; gap: 12px; }
    .evo-entry {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
    }
    .evo-entry-header {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      cursor: pointer; border-bottom: 1px solid #21262d;
    }
    .evo-entry-header:hover { background: #1c2128; }
    .evo-entry-date { font-size: 13px; font-weight: 600; color: #e6edf3; min-width: 100px; }
    .evo-entry-summary { font-size: 13px; color: #8b949e; flex: 1; }
    .evo-entry-body { padding: 10px 14px; display: none; }
    .evo-entry.open .evo-entry-body { display: block; }
    .evo-entry.open .evo-entry-header { background: #1c2128; }
    .evo-entry-text { font-size: 14px; color: #c9d1d9; margin-bottom: 8px; }
    .evo-views { list-style: none; margin-bottom: 6px; }
    .evo-views li { font-size: 13px; color: #8b949e; padding: 2px 0 2px 14px; position: relative; }
    .evo-views li::before { content: '›'; position: absolute; left: 0; color: #58a6ff; }
    .evo-trades { font-size: 12px; color: #3fb950; font-style: italic; }

    .evo-empty { text-align: center; padding: 48px 20px; color: #8b949e; font-size: 14px; }
    .evo-select-prompt { text-align: center; padding: 60px 20px; color: #8b949e; }
    .evo-select-prompt .icon { font-size: 32px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Macro<span>Brain</span></div>
  <div class="header-meta" id="lastUpdated">Loading...</div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="showTab('today')">Today</button>
  <button class="tab" onclick="showTab('week')">7 Days</button>
  <button class="tab" onclick="showTab('month')">30 Days</button>
  <button class="tab" onclick="showTab('evolution')">Evolution</button>
  <button class="tab" onclick="showTab('ask')">Ask the Brain</button>
</nav>

<main class="content">
  <div id="tab-today"></div>
  <div id="tab-week"      style="display:none"></div>
  <div id="tab-month"     style="display:none"></div>
  <div id="tab-evolution" style="display:none"></div>
  <div id="tab-ask"       style="display:none"></div>
</main>

<script>
let summaries = null, content = null, activeTab = 'today', askScope = '30d';
let selectedInvestor = null;

// ── Tab switching ──────────────────────────────────────────────────────────────
function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['today','week','month','evolution','ask'][i] === name);
  });
  ['today','week','month','evolution','ask'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }
  catch { return d; }
}
function sentBadge(s) {
  const cls = {bullish:'sent-bullish', bearish:'sent-bearish', neutral:'sent-neutral', mixed:'sent-mixed'};
  const lbl = s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Mixed';
  return `<span class="sentiment-badge ${cls[s]||'sent-mixed'}">${lbl}</span>`;
}
function bulletList(items, cls) {
  if (!items || !items.length) return '<div style="color:#8b949e;font-size:13px;padding:6px 0">No data for this period yet.</div>';
  return `<div class="bullet-list">${items.map(t => `<div class="bullet-item ${cls}">${t}</div>`).join('')}</div>`;
}

// ── Render period panel ────────────────────────────────────────────────────────
function renderPeriod(data, key, allEntries) {
  if (!data) return '<div class="state"><p>No data.</p></div>';

  const isToday = key === 'today';
  const label = isToday ? 'Today' : key === 'week' ? 'Last 7 Days' : 'Last 30 Days';
  const range = isToday ? fmtDate(data.date)
    : `${fmtDate(data.period_start)} — ${fmtDate(data.period_end)}`;

  const cutoff = isToday ? data.date : data.period_start;
  const periodEntries = (allEntries || []).filter(e => e.date >= cutoff);
  const buyEntries  = periodEntries.filter(e => e.side === 'buy');
  const sellEntries = periodEntries.filter(e => e.side === 'sell');

  let html = `
    <div class="period-header">
      <div>
        <div class="period-title">${label}</div>
        <div class="period-meta">${range}</div>
      </div>
      <span class="entry-pill">
        <span class="dot" style="background:${data.entries_count ? '#3fb950' : '#8b949e'}"></span>
        ${data.entries_count} sources
      </span>
    </div>`;

  if (!data.entries_count) {
    html += `<div class="no-content">No content scraped yet. Daily scrape runs at 07:00 CET.</div>`;
  }

  // ── Buy-side & Sell-side side by side ──
  html += `<div class="two-col">
    <div class="col-block">
      <div class="sec-label buy">Buy-Side ${sentBadge(data.buy_side_sentiment)}</div>
      ${bulletList(data.buy_side_bullets, 'buy-bullet')}
    </div>
    <div class="col-block">
      <div class="sec-label sell">Sell-Side ${sentBadge(data.sell_side_sentiment)}</div>
      ${bulletList(data.sell_side_bullets, 'sell-bullet')}
    </div>
  </div>`;

  // ── What's New ──
  if (data.whats_new && data.whats_new.length) {
    html += `<div class="sec-label new">What's New</div>
      ${bulletList(data.whats_new, 'new-bullet')}`;
  }

  // ── Aligned ──
  if (data.aligned && data.aligned.length) {
    html += `<div class="sec-label align">Where They Agree</div>
      ${bulletList(data.aligned, 'align-bullet')}`;
  }

  // ── Divergences: Buy vs Sell | Buy vs Market | Sell vs Market ──
  const hasDiff = (data.buy_vs_sell_divergence && data.buy_vs_sell_divergence.length)
               || (data.vs_market_buy && data.vs_market_buy.length)
               || (data.vs_market_sell && data.vs_market_sell.length);

  if (hasDiff) {
    html += `<div class="sec-label diff">Divergences</div>
      <div class="three-col">`;

    if (data.buy_vs_sell_divergence && data.buy_vs_sell_divergence.length) {
      html += `<div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#f85149;margin-bottom:8px">Buy vs Sell</div>
        ${bulletList(data.buy_vs_sell_divergence, 'diff-bullet')}
      </div>`;
    }
    if (data.vs_market_buy && data.vs_market_buy.length) {
      html += `<div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#bc8cff;margin-bottom:8px">Buy-Side vs Market</div>
        ${bulletList(data.vs_market_buy, 'mkt-bullet')}
      </div>`;
    }
    if (data.vs_market_sell && data.vs_market_sell.length) {
      html += `<div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#bc8cff;margin-bottom:8px">Sell-Side vs Market</div>
        ${bulletList(data.vs_market_sell, 'mkt-bullet')}
      </div>`;
    }
    html += `</div>`;
  }

  // ── Trade Ideas (split buy vs sell) ──
  const hasTrades = (data.buy_side_trades && data.buy_side_trades.length)
                 || (data.sell_side_trades && data.sell_side_trades.length);
  if (hasTrades) {
    html += `<div class="sec-label trade">Top Trade Ideas</div>
      <div class="two-col">
        <div class="col-block">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#58a6ff;margin-bottom:8px">Buy-Side Trades</div>
          ${bulletList(data.buy_side_trades, 'trade-bullet')}
        </div>
        <div class="col-block">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#e3b341;margin-bottom:8px">Sell-Side Trades</div>
          ${bulletList(data.sell_side_trades, 'trade-bullet')}
        </div>
      </div>`;
  }

  // ── Themes ──
  if (data.dominant_themes && data.dominant_themes.length) {
    html += `<div class="themes">${data.dominant_themes.map(t => `<span class="theme-tag">${t}</span>`).join('')}</div>`;
  }

  // ── Individual entries (collapsed by default) ──
  if (periodEntries.length) {
    const toggleId = `entries-${key}`;
    html += `
      <div class="entries-toggle" onclick="toggleEntries('${toggleId}')">
        <span id="${toggleId}-icon">▸</span> Individual entries (${periodEntries.length})
      </div>
      <div class="entries-list" id="${toggleId}" style="display:none">
        ${[...buyEntries, ...sellEntries].map(e => renderCard(e)).join('')}
      </div>`;
  }

  return html;
}

function toggleEntries(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById(id + '-icon');
  if (el.style.display === 'none') { el.style.display = 'block'; icon.textContent = '▾'; }
  else { el.style.display = 'none'; icon.textContent = '▸'; }
}

function renderCard(e) {
  const sideClass = e.side === 'buy' ? 'side-buy' : 'side-sell';
  const sideLabel = e.side === 'buy' ? 'Buy-Side' : 'Sell-Side';
  const sentCls = {bullish:'sent-bullish', bearish:'sent-bearish', neutral:'sent-neutral', mixed:'sent-mixed'};
  const id = `card-${e.id}`;
  const views  = (e.key_views   || []).map(v => `<li>${v}</li>`).join('');
  const trades = (e.trade_ideas || []).map(t => `<div class="trade-mini">→ ${t}</div>`).join('');
  const srcs   = (e.sources     || []).slice(0,3).map((s,i) => `<a href="${s}" target="_blank" rel="noopener">Source ${i+1}</a>`).join('');

  return `<div class="investor-card" id="${id}">
    <div class="investor-card-header" onclick="document.getElementById('${id}').classList.toggle('open')">
      <div class="investor-info">
        <span class="investor-name">${e.investor}</span>
        <span class="investor-side ${sideClass}">${sideLabel}</span>
        <span class="sentiment-badge ${sentCls[e.sentiment]||'sent-mixed'}" style="font-size:10px;padding:1px 6px">${e.sentiment||'mixed'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:#8b949e">${fmtDate(e.date)}</span>
        <span class="expand-icon">▾</span>
      </div>
    </div>
    <div class="investor-card-body">
      <p class="investor-summary">${e.summary||''}</p>
      ${views ? `<ul class="view-list">${views}</ul>` : ''}
      ${trades}
      ${srcs ? `<div class="sources-row">${srcs}</div>` : ''}
    </div>
  </div>`;
}

// ── Evolution tab ─────────────────────────────────────────────────────────────
function renderEvolutionTab() {
  if (!content) return '<div class="state"><p>No data loaded.</p></div>';
  const entries = content.entries || [];

  // Build investor list with entry counts
  const investorMap = {};
  entries.forEach(e => {
    if (!investorMap[e.investor]) investorMap[e.investor] = { side: e.side, entries: [] };
    investorMap[e.investor].entries.push(e);
  });

  const buyList  = Object.entries(investorMap).filter(([,v]) => v.side === 'buy')
    .sort((a,b) => b[1].entries.length - a[1].entries.length);
  const sellList = Object.entries(investorMap).filter(([,v]) => v.side === 'sell')
    .sort((a,b) => b[1].entries.length - a[1].entries.length);

  const makeBtn = ([name, data]) => {
    const sideClass = selectedInvestor === name
      ? (data.side === 'buy' ? 'active buy-active' : 'active sell-active') : '';
    return `<button class="evo-investor-btn ${sideClass}" onclick="selectInvestor('${name.replace(/'/g,"\\'")}')">
      ${name} <span style="float:right;font-size:11px;color:#8b949e">${data.entries.length}</span>
    </button>`;
  };

  const sidebar = `
    <div class="evo-sidebar">
      <div class="evo-group-label">Buy-Side</div>
      ${buyList.length ? buyList.map(makeBtn).join('') : '<div style="font-size:12px;color:#8b949e;padding:4px">No data yet</div>'}
      <div class="evo-group-label" style="margin-top:16px">Sell-Side</div>
      ${sellList.length ? sellList.map(makeBtn).join('') : '<div style="font-size:12px;color:#8b949e;padding:4px">No data yet</div>'}
    </div>`;

  const main = selectedInvestor && investorMap[selectedInvestor]
    ? renderInvestorTimeline(selectedInvestor, investorMap[selectedInvestor])
    : `<div class="evo-select-prompt">
        <div class="icon">◎</div>
        <div>Select an investor to see how their views have evolved over time</div>
      </div>`;

  return `<div class="evo-layout">${sidebar}<div class="evo-main">${main}</div></div>`;
}

function selectInvestor(name) {
  selectedInvestor = name;
  document.getElementById('tab-evolution').innerHTML = renderEvolutionTab();
}

function renderInvestorTimeline(name, data) {
  const entries = [...data.entries].sort((a, b) => a.date < b.date ? 1 : -1); // newest first
  const side = data.side === 'buy' ? 'Buy-Side' : 'Sell-Side';
  const sideColor = data.side === 'buy' ? '#58a6ff' : '#e3b341';
  const firstDate = fmtDate(entries[entries.length - 1].date);
  const lastDate  = fmtDate(entries[0].date);

  // Sentiment trend strip (oldest → newest, left to right)
  const chronological = [...entries].reverse();
  const sentCls = { bullish:'t-bullish', bearish:'t-bearish', mixed:'t-mixed', neutral:'t-neutral' };
  const sentIcon = { bullish:'▲', bearish:'▼', mixed:'◆', neutral:'—' };
  const trendStrip = `<div class="trend-strip">
    <span style="font-size:11px;color:#8b949e;margin-right:4px">Oldest</span>
    ${chronological.map(e => `
      <div class="trend-dot ${sentCls[e.sentiment]||'t-mixed'}" title="${fmtDate(e.date)}: ${e.sentiment}">
        ${sentIcon[e.sentiment]||'◆'}
        <div class="trend-tooltip">${fmtDate(e.date)}: ${e.sentiment}</div>
      </div>`).join('')}
    <span style="font-size:11px;color:#8b949e;margin-left:4px">Latest</span>
  </div>`;

  // Sentiment summary
  const counts = entries.reduce((a, e) => { a[e.sentiment] = (a[e.sentiment]||0)+1; return a; }, {});
  const dominant = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const recentShift = entries.length >= 2 && entries[0].sentiment !== entries[1].sentiment
    ? `<span style="color:#f0883e;font-size:12px;margin-left:8px">⚡ Sentiment shifted: ${entries[1].sentiment} → ${entries[0].sentiment} (latest)</span>`
    : '';

  // Timeline cards
  const cards = entries.map((e, i) => {
    const id = `evo-${e.id}`;
    const isLatest = i === 0;
    const views  = (e.key_views   || []).map(v => `<li>${v}</li>`).join('');
    const trades = (e.trade_ideas || []).map(t => `<div class="evo-trades">→ ${t}</div>`).join('');
    const srcs   = (e.sources     || []).slice(0,3).map((s,j) => `<a href="${s}" target="_blank" rel="noopener" style="color:#58a6ff;font-size:11px;text-decoration:none;margin-right:8px">Source ${j+1}</a>`).join('');

    return `<div class="evo-entry ${isLatest ? 'open' : ''}" id="${id}">
      <div class="evo-entry-header" onclick="document.getElementById('${id}').classList.toggle('open')">
        <span class="evo-entry-date">${fmtDate(e.date)}${isLatest ? ' <span style="font-size:10px;background:rgba(88,166,255,0.15);color:#58a6ff;padding:1px 6px;border-radius:4px;margin-left:4px">Latest</span>' : ''}</span>
        <span class="sentiment-badge ${sentCls[e.sentiment]||'sent-mixed'}" style="font-size:10px">${e.sentiment||'mixed'}</span>
        <span class="evo-entry-summary">${(e.summary||'').slice(0,90)}${e.summary && e.summary.length > 90 ? '…' : ''}</span>
      </div>
      <div class="evo-entry-body">
        <p class="evo-entry-text">${e.summary||''}</p>
        ${views ? `<ul class="evo-views">${views}</ul>` : ''}
        ${trades}
        ${srcs ? `<div style="margin-top:8px">${srcs}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
    <div class="evo-header">
      <div class="evo-name" style="color:${sideColor}">${name}</div>
      <div class="evo-meta">
        ${side} · ${entries.length} ${entries.length === 1 ? 'entry' : 'entries'} · ${firstDate} — ${lastDate}
        · Predominantly <strong>${dominant[0]}</strong> (${dominant[1]}/${entries.length})
        ${recentShift}
      </div>
      ${trendStrip}
    </div>
    <div class="evo-timeline">${cards}</div>`;
}

// ── Ask tab ────────────────────────────────────────────────────────────────────
function renderAskTab() {
  const saved = localStorage.getItem('anthropic_api_key') || '';
  return `<div class="ask-container">
    <div class="api-key-row">
      <span class="api-key-label">Anthropic API Key</span>
      <input class="api-key-input" id="apiKeyInput" type="password"
        placeholder="sk-ant-..." value="${saved}" autocomplete="off" spellcheck="false">
      <button class="save-btn" onclick="saveKey()">Save</button>
      <span class="key-ok" id="keyStatus">${saved ? '✓' : ''}</span>
    </div>
    <div style="font-size:12px;color:#8b949e;margin-bottom:8px">Scope:</div>
    <div class="scope-row">
      <button class="scope-btn ${askScope==='today'?'active':''}" onclick="setScope('today')">Today</button>
      <button class="scope-btn ${askScope==='7d'?'active':''}" onclick="setScope('7d')">7 Days</button>
      <button class="scope-btn ${askScope==='30d'?'active':''}" onclick="setScope('30d')">30 Days</button>
      <button class="scope-btn ${askScope==='all'?'active':''}" onclick="setScope('all')">All</button>
    </div>
    <div class="query-row">
      <textarea class="query-input" id="queryInput" rows="2"
        placeholder="E.g. What do practitioners think about US equities? Where do buy-side and sell-side disagree on rates?"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitQuery()}"></textarea>
      <button class="ask-btn" id="askBtn" onclick="submitQuery()">Ask</button>
    </div>
    <div class="response-box" id="responseBox"></div>

}

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (k) { localStorage.setItem('anthropic_api_key', k); document.getElementById('keyStatus').textContent = '✓'; }
}

function setScope(s) {
  askScope = s;
  document.getElementById('tab-ask').innerHTML = renderAskTab();
}

function getRelevantEntries(query) {
  if (!content) return [];
  const tokens = query.toLowerCase().split(/\s+/).filter(t => t.length > 3);
  const today = new Date().toISOString().split('T')[0];
  const cutoffs = { today, '7d': offset(7), '30d': offset(30), all: '2000-01-01' };
  const cutoff = cutoffs[askScope] || offset(30);
  const filtered = content.entries.filter(e => e.date >= cutoff);
  const scored = filtered.map(e => {
    const txt = [e.investor, e.summary, ...(e.key_views||[]), ...(e.trade_ideas||[])].join(' ').toLowerCase();
    const score = tokens.reduce((a, t) => a + (txt.includes(t) ? 1 : 0), 0);
    return { e, score };
  });
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, 25).map(x => x.e);
}

function offset(days) {
  return new Date(Date.now() - days*86400000).toISOString().split('T')[0];
}

function buildCtx(entries) {
  return entries.map(e => {
    const side = e.side === 'buy' ? 'BUY-SIDE' : 'SELL-SIDE';
    return `[${e.date}] ${e.investor} (${side}, ${(e.sentiment||'').toUpperCase()})
  View: ${e.summary}
  Key: ${(e.key_views||[]).join(' | ')}
  Trades: ${(e.trade_ideas||[]).join(' | ')}`;
  }).join('\n\n');
}

async function submitQuery() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;
  const apiKey = localStorage.getItem('anthropic_api_key') || document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) { alert('Please save your Anthropic API key first.'); return; }

  const btn = document.getElementById('askBtn');
  const box = document.getElementById('responseBox');
  btn.disabled = true; btn.textContent = '...';
  box.className = 'response-box visible';
  box.innerHTML = '<span class="inline-spinner"></span> Searching corpus...';

  const relevant = getRelevantEntries(query);
  const scopeLabel = {today:'today', '7d':'last 7 days', '30d':'last 30 days', all:'all available data'}[askScope];

  // Build enriched context including sources per investor
  const ctx = relevant.map(e => {
    const side = e.side === 'buy' ? 'BUY-SIDE' : 'SELL-SIDE';
    return `[${e.date}] ${e.investor} (${side}, ${(e.sentiment||'').toUpperCase()})
  View: ${e.summary}
  Key: ${(e.key_views||[]).join(' | ')}
  Trades: ${(e.trade_ideas||[]).join(' | ')}`;
  }).join('\n\n');

  const sys = `You are Macro Brain, synthesising views from top macro investors and strategists.

BUY-SIDE: Stan Druckenmiller, Ray Dalio, Paul Tudor Jones, Howard Marks, George Soros, David Tepper, Jeffrey Gundlach, Kyle Bass, Michael Burry, Alan Howard, Scott Bessent, Bill Ackman, David Einhorn, Crispin Odey.
SELL-SIDE: Jim Reid (DB), Torsten Slok (Apollo), Michael Hartnett (BofA), Albert Edwards (SocGen), David Rosenberg, Ed Yardeni, Jan Hatzius (GS), Mike Wilson (MS), Russell Napier, Peter Berezin (BCA), Liz Ann Sonders (Schwab), Barry Bannister (Stifel), Jordi Visser (22V Research), John Mauldin (Mauldin Economics).

Corpus (${scopeLabel}, ${relevant.length} entries):
${ctx || 'No relevant entries found.'}

Return ONLY a JSON object — no prose, no markdown fences:
{
  "key_points": [
    {"point": "Concise insight (max 20 words)", "agree": ["Name1", "Name2 ↑ shift"], "disagree": ["Name3"]}
  ]
}

Rules:
- MINIMAL JSON — each key_point has only: point (string), agree (array of names), disagree (array of names)
- 3-5 bullets, most market-important first
- BULLET FORMAT: content first, never start with a name. GOOD: "Equities at extremes — cutting risk." BAD: "Dalio warns..."
- agree/disagree: just the investor's last name (or full name if ambiguous), corpus only, max 5 per bullet
- CHANGE OF VIEW: append " ↑ shift" to the name — e.g. "Dalio ↑ shift"
- EVOLVING VIEW: append " ↑ evolving" instead if the view intensified without fully reversing
- If no relevant data: {"key_points": [{"point": "No relevant data found.", "agree": [], "disagree": []}]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 4000,
        system: sys, messages: [{role:'user', content:query}]
      })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    const data = await res.json();

    let parsed;
    try {
      let raw = data.content[0].text.trim();
      if (raw.includes('```')) raw = raw.split('```')[1].replace(/^json/,'').trim();
      parsed = JSON.parse(raw);
    } catch(e) {
      box.innerHTML = `<div style="color:#f85149">Could not parse response. Raw: ${data.content[0].text.slice(0,200)}</div>`;
      btn.disabled = false; btn.textContent = 'Ask';
      return;
    }

    box.innerHTML = renderAskResponse(parsed, relevant, scopeLabel, data.usage);
  } catch(err) {
    box.innerHTML = `<div style="color:#f85149">Error: ${err.message}</div>`;
  }
  btn.disabled = false; btn.textContent = 'Ask';
}

function renderAskResponse(parsed, relevant, scopeLabel, usage) {
  const sentCls = {bullish:'sent-bullish', bearish:'sent-bearish', mixed:'sent-mixed', neutral:'sent-neutral'};

  // Build source map from corpus entries
  const sourceMap = {};
  relevant.forEach(e => { sourceMap[e.investor] = e.sources || []; });

  // Key points
  // Build a name→side lookup from corpus entries
  const sideMap = {};
  relevant.forEach(e => { sideMap[e.investor.toLowerCase()] = e.side; });
  function lookupSide(rawName) {
    const base = rawName.replace(/\s*↑\s*(shift|evolving)/i, '').trim().toLowerCase();
    // Try exact match, then last-name match
    if (sideMap[base]) return sideMap[base];
    for (const [k, v] of Object.entries(sideMap)) {
      if (k.includes(base) || base.includes(k.split(' ').pop())) return v;
    }
    return 'buy'; // fallback
  }

  let html = '';
  (parsed.key_points || []).forEach(kp => {
    html += `<div class="ask-key-point">
      <div class="ask-point-text">${kp.point}</div>
      <div class="ask-agree-row">`;

    const agrees = kp.agree || kp.agreeing || [];
    const disagrees = kp.disagree || kp.disagreeing || [];

    if (agrees.length) {
      html += `<span class="ask-agree-label">Agrees:</span>`;
      agrees.forEach(raw => {
        const name = typeof raw === 'object' ? (raw.name || '') : raw;
        const side = typeof raw === 'object' ? raw.side : lookupSide(name);
        const slug = name.replace(/\s*↑\s*(shift|evolving)/i,'').trim().replace(/'/g,"\\'");
        html += `<span class="ask-name-tag ${side}" onclick="scrollToIndividual('${slug}')">${name}</span>`;
      });
    }
    if (disagrees.length) {
      html += `<span class="ask-agree-label" style="margin-left:8px">Disagrees:</span>`;
      disagrees.forEach(raw => {
        const name = typeof raw === 'object' ? (raw.name || '') : raw;
        const slug = name.replace(/\s*↑\s*(shift|evolving)/i,'').trim().replace(/'/g,"\\'");
        html += `<span class="ask-name-tag dis" onclick="scrollToIndividual('${slug}')">${name}</span>`;
      });
    }

    html += `</div></div>`;
  });

  // Individual views — built directly from corpus data (no Claude needed)
  if (relevant.length) {
    html += `<div class="ask-individuals">
      <div class="ask-ind-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.tog-icon').textContent=this.nextElementSibling.classList.contains('open')?'▾':'▸'">
        <span class="tog-icon">▸</span> Individual views (${relevant.length} investors in scope)
      </div>
      <div class="ask-ind-list">`;

    relevant.forEach(e => {
      const slugId = 'ind-' + e.investor.replace(/\s+/g,'-').toLowerCase();
      const srcs = (e.sources || []).slice(0, 3);
      const srcHtml = srcs.length
        ? `<div class="ask-src">${srcs.map((s,i) => `<a href="${s}" target="_blank" rel="noopener">Source ${i+1}</a>`).join('')}</div>`
        : '';
      const trades = (e.trade_ideas || []).filter(Boolean);
      const sentClass = sentCls[e.sentiment] || 'sent-mixed';
      html += `<div class="ask-ind-card" id="${slugId}">
        <div class="ask-ind-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="investor-side ${e.side==='buy'?'side-buy':'side-sell'}">${e.side==='buy'?'Buy':'Sell'}</span>
          <span class="ask-ind-name">${e.investor}</span>
          <span class="sentiment-badge ${sentClass}" style="font-size:10px">${e.sentiment||'mixed'}</span>
          <span style="font-size:11px;color:#8b949e;margin-left:auto">${e.date}</span>
        </div>
        <div class="ask-ind-body">
          <p style="margin:10px 0 6px">${e.summary||''}</p>
          ${(e.key_views||[]).length ? `<ul style="margin:4px 0 6px;padding-left:16px;font-size:12px;color:#8b949e">${e.key_views.map(v=>`<li>${v}</li>`).join('')}</ul>` : ''}
          ${trades.length ? `<div style="font-size:12px;color:#3fb950;font-style:italic;margin-top:4px">→ ${trades.join(' · ')}</div>` : ''}
          ${srcHtml}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }

  html += `<div class="response-meta">${relevant.length} entries searched (${scopeLabel}) · ${usage?.input_tokens||'?'} in / ${usage?.output_tokens||'?'} out tokens</div>`;
  return html;
}

function scrollToIndividual(name) {
  // Expand the individual views section and scroll to the investor
  const listEl = document.querySelector('.ask-ind-list');
  if (listEl) {
    listEl.classList.add('open');
    const icon = document.querySelector('.tog-icon');
    if (icon) icon.textContent = '▾';
  }
  const slugId = 'ind-' + name.replace(/\s+/g,'-').toLowerCase();
  const el = document.getElementById(slugId);
  if (el) {
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.querySelector('.ask-ind-body')?.classList.add('open');
    el.style.borderColor = '#58a6ff';
    setTimeout(() => { el.style.borderColor = ''; }, 2000);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────────
async function init() {
  ['today','week','month'].forEach(t => {
    document.getElementById(`tab-${t}`).innerHTML = `<div class="state"><div class="spinner"></div><p>Loading...</p></div>`;
  });
  document.getElementById('tab-ask').innerHTML = renderAskTab();

  try {
    const [sRes, cRes] = await Promise.all([
      fetch('data/summaries.json?v=' + Date.now()),
      fetch('data/content.json?v=' + Date.now())
    ]);
    summaries = await sRes.json();
    content   = await cRes.json();

    document.getElementById('lastUpdated').textContent = `Updated ${fmtDate(summaries.generated_at)}`;

    const entries = content.entries || [];
    document.getElementById('tab-today').innerHTML     = renderPeriod(summaries.today, 'today', entries);
    document.getElementById('tab-week').innerHTML      = renderPeriod(summaries.week,  'week',  entries);
    document.getElementById('tab-month').innerHTML     = renderPeriod(summaries.month, 'month', entries);
    document.getElementById('tab-evolution').innerHTML = renderEvolutionTab();
  } catch(err) {
    ['today','week','month'].forEach(t => {
      document.getElementById(`tab-${t}`).innerHTML =
        `<div class="state"><p style="color:#f85149">Failed to load: ${err.message}</p></div>`;
    });
  }
}

init();
</script>
